name: FullStackTrade
options:
  bundleIdPrefix: com.fullstacktrade
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

targets:
  FullStackTrade:
    type: application
    platform: iOS
    sources:
      - path: FullStackTrade
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fullstacktrade.app
        PRODUCT_NAME: FullStack Trade
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_KEY_CFBundleDisplayName: "FullStack Trade"

  FullStackTradeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FullStackTradeTests
        type: group
    dependencies:
      - target: FullStackTrade
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FullStack Trade.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/FullStack Trade"

  FullStackTradeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FullStackTradeUITests
        type: group
    dependencies:
      - target: FullStackTrade
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  FullStackTrade:
    build:
      targets:
        FullStackTrade: all
        FullStackTradeTests: [test]
        FullStackTradeUITests: [test]
    test:
      targets:
        - FullStackTradeTests
        - FullStackTradeUITests
